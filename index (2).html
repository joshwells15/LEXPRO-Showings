<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexPro — Team Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B2A47;
    --gold: #C9A84C;
    --gold-light: #F5E6C8;
    --cream: #FAF7F2;
    --white: #FFFFFF;
    --gray: #6B7280;
    --border: #E5E0D8;
    --success: #2E7D32;
    --error: #C62828;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 60px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .logo-mark {
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark img {
    height: 56px;
    width: auto;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 14px;
    color: var(--gray);
    margin-top: 6px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  /* ── MAIN TABS ── */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px;
    width: 100%;
    max-width: 560px;
  }

  .tab-btn {
    flex: 1;
    padding: 12px 8px;
    border: none;
    background: transparent;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray);
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: background 0.2s, color 0.2s;
  }

  .tab-btn.active {
    background: var(--navy);
    color: var(--white);
  }

  /* ── SUB TABS (Seller / Buyer) ── */
  .sub-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    width: 100%;
    max-width: 560px;
  }

  .sub-tab-btn {
    flex: 1;
    padding: 11px 8px;
    border: 1.5px solid var(--border);
    background: var(--white);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray);
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .sub-tab-btn.active {
    border-color: var(--gold);
    background: var(--gold-light);
    color: var(--navy);
  }

  /* ── PILL TABS (tools within Seller / Buyer) ── */
  .pill-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 560px;
  }

  .pill-btn {
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    background: var(--white);
    border-radius: 999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray);
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .pill-btn.active {
    border-color: var(--navy);
    background: var(--navy);
    color: var(--white);
  }

  .tab-page { display: none; width: 100%; max-width: 560px; flex-direction: column; align-items: center; }
  .tab-page.active { display: flex; }

  .sub-page { display: none; width: 100%; flex-direction: column; align-items: center; }
  .sub-page.active { display: flex; }

  .tool-page { display: none; width: 100%; }
  .tool-page.active { display: block; }

  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    box-shadow: 0 4px 40px rgba(27, 42, 71, 0.08);
    border: 1px solid var(--border);
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--gold-light);
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    margin-bottom: 6px;
    letter-spacing: 0.2px;
  }

  label .req {
    color: var(--gold);
    margin-left: 2px;
  }

  input, select, textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--navy);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  textarea { resize: vertical; min-height: 100px; }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.12);
    background: var(--white);
  }

  input::placeholder, textarea::placeholder { color: #B0A99A; }

  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 14px;
    pointer-events: none;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  .btn {
    width: 100%;
    padding: 16px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
    position: relative;
  }

  .btn:hover { background: #243659; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { background: #B0A99A; cursor: not-allowed; }

  .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading .spinner { display: block; }
  .loading .btn-text { opacity: 0.7; }

  .toast {
    display: none;
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: white;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    z-index: 100;
    animation: slideDown 0.3s ease;
  }

  .toast.error { background: var(--error); }
  .toast.show { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .loading-listings {
    font-size: 13px;
    color: var(--gray);
    font-style: italic;
    padding: 12px 16px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 10px;
  }

  /* ── CONTACT SEARCH ── */
  .search-wrap { position: relative; }

  .search-results {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(27, 42, 71, 0.12);
    z-index: 50;
    max-height: 240px;
    overflow-y: auto;
  }

  .search-results.show { display: block; }

  .search-result {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .search-result:last-child { border-bottom: none; }
  .search-result:hover { background: var(--gold-light); }

  .sr-name { font-size: 14px; font-weight: 500; color: var(--navy); }
  .sr-phone { font-size: 12px; color: var(--gray); margin-top: 2px; }

  .selected-contact {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--gold-light);
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    margin-top: 8px;
  }

  .selected-contact.show { display: flex; }

  .sc-info { font-size: 14px; color: var(--navy); font-weight: 500; }
  .sc-phone { font-size: 12px; color: var(--gray); font-weight: 400; }

  .sc-clear {
    background: none;
    border: none;
    color: var(--navy);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  .char-count {
    font-size: 11px;
    color: var(--gray);
    text-align: right;
    margin-top: 4px;
  }

  .char-count.over { color: var(--error); }

  /* ── QUEUE ── */
  .queue-card { margin-top: 24px; }

  .queue-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--gold-light);
  }

  .queue-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--gray);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .refresh-btn:hover { border-color: var(--gold); color: var(--navy); }

  .queue-empty {
    font-size: 13px;
    color: var(--gray);
    font-style: italic;
    padding: 16px 0;
    text-align: center;
  }

  .queue-item {
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    background: var(--cream);
  }

  .qi-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .qi-name { font-size: 14px; font-weight: 500; color: var(--navy); }

  .qi-when {
    font-size: 12px;
    color: var(--gold);
    font-weight: 500;
    white-space: nowrap;
  }

  .qi-msg {
    font-size: 13px;
    color: var(--gray);
    line-height: 1.5;
    margin-bottom: 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .qi-actions { display: flex; gap: 8px; }

  .qi-btn {
    flex: 1;
    padding: 9px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .qi-btn:hover { opacity: 0.85; }
  .qi-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .qi-edit {
    background: var(--white);
    border: 1.5px solid var(--navy);
    color: var(--navy);
  }

  .qi-cancel {
    background: var(--white);
    border: 1.5px solid var(--error);
    color: var(--error);
  }

  .sent-item {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .sent-item:last-child { border-bottom: none; }

  .si-name { font-size: 13px; font-weight: 500; color: var(--navy); white-space: nowrap; }
  .si-msg {
    font-size: 12px;
    color: var(--gray);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .si-when { font-size: 11px; color: var(--gray); white-space: nowrap; }

  .editing-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--gold-light);
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--navy);
    font-weight: 500;
  }

  .editing-banner.show { display: flex; }

  .eb-cancel {
    background: none;
    border: none;
    color: var(--navy);
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .row { grid-template-columns: 1fr; gap: 0; }
    h1 { font-size: 26px; }
    .pill-btn { flex: 1 1 auto; text-align: center; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-mark"><img src="lexpro-logo.png" alt="LexPro"></div>
  <h1 id="pageTitle">Contacts</h1>
  <p class="subtitle">LexPro Real Estate · Internal Use Only</p>
</div>

<!-- ── MAIN TABS ── -->
<div class="tabs">
  <button class="tab-btn active" data-tab="contacts">Contact Type</button>
  <button class="tab-btn" data-tab="messages">Scheduled Messages</button>
</div>

<!-- ════════════ TAB 1: CONTACT TYPE ════════════ -->
<div class="tab-page active" id="page-contacts">

  <!-- Seller / Buyer -->
  <div class="sub-tabs">
    <button class="sub-tab-btn active" data-sub="seller">Seller</button>
    <button class="sub-tab-btn" data-sub="buyer">Buyer</button>
  </div>

  <!-- ─────────── SELLER ─────────── -->
  <div class="sub-page active" id="sub-seller">

    <div class="pill-tabs" id="sellerPills">
      <button class="pill-btn active" data-tool="seller-create">Create Contact</button>
      <button class="pill-btn" data-tool="seller-showing">Showing Intake</button>
    </div>

    <!-- SELLER: CREATE CONTACT -->
    <div class="tool-page active" id="tool-seller-create">
      <div class="card">
        <form id="sellerCreateForm">
          <div class="section-label">New Seller Contact</div>
          <div class="row">
            <div class="form-group">
              <label for="sc-first">First Name <span class="req">*</span></label>
              <input type="text" id="sc-first" placeholder="First name" required>
            </div>
            <div class="form-group">
              <label for="sc-last">Last Name <span class="req">*</span></label>
              <input type="text" id="sc-last" placeholder="Last name" required>
            </div>
          </div>
          <div class="form-group">
            <label for="sc-phone">Phone <span class="req">*</span></label>
            <input type="tel" id="sc-phone" placeholder="(417) 555-0100" required>
          </div>
          <div class="form-group">
            <label for="sc-email">Email</label>
            <input type="email" id="sc-email" placeholder="name@email.com">
          </div>
          <button type="submit" class="btn" id="sellerCreateBtn">
            <div class="btn-inner">
              <div class="spinner"></div>
              <span class="btn-text">Create Contact</span>
            </div>
          </button>
        </form>
      </div>
    </div>

    <!-- SELLER: SHOWING INTAKE -->
    <div class="tool-page" id="tool-seller-showing">
      <div class="card">
        <form id="showingForm">

          <div class="section-label">Listing</div>
          <div class="form-group">
            <label for="listing">Property Address <span class="req">*</span></label>
            <div class="select-wrap">
              <div id="listingLoading" class="loading-listings">Loading active listings...</div>
              <select id="listing" name="listing" style="display:none;" required>
                <option value="">— Select a listing —</option>
              </select>
            </div>
          </div>

          <div class="divider"></div>

          <div class="section-label">Showing Agent</div>
          <div class="form-group">
            <label for="agentName">Agent Name <span class="req">*</span></label>
            <input type="text" id="agentName" name="agentName" placeholder="Full name" required>
          </div>
          <div class="row">
            <div class="form-group">
              <label for="agentPhone">Agent Phone</label>
              <input type="tel" id="agentPhone" name="agentPhone" placeholder="(417) 555-0100">
            </div>
            <div class="form-group">
              <label for="agentEmail">Agent Email</label>
              <input type="email" id="agentEmail" name="agentEmail" placeholder="agent@realty.com">
            </div>
          </div>

          <div class="divider"></div>

          <div class="section-label">Showing Details</div>
          <div class="row">
            <div class="form-group">
              <label for="showingDate">Date <span class="req">*</span></label>
              <input type="date" id="showingDate" name="showingDate" required>
            </div>
            <div class="form-group">
              <label for="showingTime">Time <span class="req">*</span></label>
              <input type="time" id="showingTime" name="showingTime" required>
            </div>
          </div>

          <button type="submit" class="btn" id="submitBtn">
            <div class="btn-inner">
              <div class="spinner"></div>
              <span class="btn-text">Log Showing</span>
            </div>
          </button>

        </form>
      </div>
    </div>

  </div>

  <!-- ─────────── BUYER ─────────── -->
  <div class="sub-page" id="sub-buyer">

    <div class="pill-tabs" id="buyerPills">
      <button class="pill-btn active" data-tool="buyer-create">Create Contact</button>
    </div>

    <!-- BUYER: CREATE CONTACT -->
    <div class="tool-page active" id="tool-buyer-create">
      <div class="card">
        <form id="buyerCreateForm">
          <div class="section-label">New Buyer Contact</div>
          <div class="row">
            <div class="form-group">
              <label for="bc-first">First Name <span class="req">*</span></label>
              <input type="text" id="bc-first" placeholder="First name" required>
            </div>
            <div class="form-group">
              <label for="bc-last">Last Name <span class="req">*</span></label>
              <input type="text" id="bc-last" placeholder="Last name" required>
            </div>
          </div>
          <div class="form-group">
            <label for="bc-phone">Phone <span class="req">*</span></label>
            <input type="tel" id="bc-phone" placeholder="(417) 555-0100" required>
          </div>
          <div class="form-group">
            <label for="bc-email">Email</label>
            <input type="email" id="bc-email" placeholder="name@email.com">
          </div>
          <button type="submit" class="btn" id="buyerCreateBtn">
            <div class="btn-inner">
              <div class="spinner"></div>
              <span class="btn-text">Create Contact</span>
            </div>
          </button>
        </form>
      </div>
    </div>

  </div>

</div>

<!-- ════════════ TAB 2: SCHEDULED MESSAGES ════════════ -->
<div class="tab-page" id="page-messages">
<div class="card">
  <div class="editing-banner" id="editingBanner">
    <span>✏️ Editing scheduled message</span>
    <button class="eb-cancel" id="editCancelBtn" type="button">cancel edit</button>
  </div>

  <form id="messageForm">

    <div class="section-label">Contact</div>
    <div class="form-group">
      <label for="contactSearch">Search Contacts <span class="req">*</span></label>
      <div class="search-wrap">
        <input type="text" id="contactSearch" placeholder="Start typing a name..." autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
      <div class="selected-contact" id="selectedContact">
        <div>
          <div class="sc-info" id="scName"></div>
          <div class="sc-phone" id="scPhone"></div>
        </div>
        <button type="button" class="sc-clear" id="scClear">✕</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-label">Message</div>
    <div class="form-group">
      <label for="msgText">Message Text <span class="req">*</span></label>
      <textarea id="msgText" placeholder="Type the message to send..." required></textarea>
      <div class="char-count" id="charCount">0 / 320</div>
    </div>

    <div class="divider"></div>

    <div class="section-label">Send Time</div>
    <div class="row">
      <div class="form-group">
        <label for="sendDate">Date <span class="req">*</span></label>
        <input type="date" id="sendDate" required>
      </div>
      <div class="form-group">
        <label for="sendTime">Time <span class="req">*</span></label>
        <input type="time" id="sendTime" required>
      </div>
    </div>

    <button type="submit" class="btn" id="scheduleBtn">
      <div class="btn-inner">
        <div class="spinner"></div>
        <span class="btn-text" id="scheduleBtnText">Schedule Message</span>
      </div>
    </button>

  </form>
</div>

<!-- PENDING QUEUE -->
<div class="card queue-card">
  <div class="queue-header">
    <div class="queue-title">Pending Queue</div>
    <button class="refresh-btn" id="refreshQueue" type="button">↻ Refresh</button>
  </div>
  <div id="pendingList">
    <div class="queue-empty">Loading...</div>
  </div>
</div>

<!-- SENT HISTORY -->
<div class="card queue-card">
  <div class="queue-header">
    <div class="queue-title">Recently Sent</div>
  </div>
  <div id="sentList">
    <div class="queue-empty">Loading...</div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  const MAKE_WEBHOOK_URL = 'https://hook.us2.make.com/jbbbmfkw9q1ik1p4oz3racpi81cnvyh1';
  const SHEET_ID = '1KlfQEU02BcEM9RUTTi64-Eu60UzuaptT_EjE6OAXKOY';
  const API_KEY  = 'AIzaSyD6mLXltjqMao1Ej0cALICxUGScHB5IKbE';
  // Scheduled Messages
  const SMS_WEBHOOK_URL = 'https://hook.us2.make.com/uwlbkbmgcdoz8hg6hp7fac19x8vm6lfh';
  // ────────────────────────────────────────────────────────────

  const toast = document.getElementById('toast');

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { toast.className = 'toast'; }, 4000);
  }

  // ── MAIN TAB SWITCHING ──────────────────────────────────────
  const pageTitle = document.getElementById('pageTitle');

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('page-' + btn.dataset.tab).classList.add('active');
      pageTitle.textContent = btn.dataset.tab === 'contacts' ? 'Contacts' : 'Scheduled Messages';
      if (btn.dataset.tab === 'messages') loadQueue();
    });
  });

  // ── SELLER / BUYER SUB-TAB SWITCHING ────────────────────────
  document.querySelectorAll('.sub-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('sub-' + btn.dataset.sub).classList.add('active');
    });
  });

  // ── TOOL PILL SWITCHING (within each sub-page) ──────────────
  document.querySelectorAll('.pill-tabs').forEach(group => {
    group.querySelectorAll('.pill-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const subPage = group.closest('.sub-page');
        subPage.querySelectorAll('.tool-page').forEach(p => p.classList.remove('active'));
        document.getElementById('tool-' + btn.dataset.tool).classList.add('active');
      });
    });
  });

  // ════════════════════════════════════════════════════════════
  // CREATE CONTACT (shared handler — seller + buyer)
  // ════════════════════════════════════════════════════════════
  async function createContact({ first, last, phone, email, btn, form }) {
    if (!first || !last) { showToast('First and last name are required.', true); return; }
    if (!phone) { showToast('Phone is required.', true); return; }

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch('/.netlify/functions/create-contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firstName: first, lastName: last, phone: phone, email: email })
      });
      const data = await res.json();

      if (!res.ok) {
        showToast(data.error || 'Could not create contact.', true);
        return;
      }

      showToast(data.isNew ? '✓ Contact created!' : '✓ Contact already existed — updated.');
      form.reset();

    } catch (err) {
      showToast('Something went wrong. Try again.', true);
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  document.getElementById('sellerCreateForm').addEventListener('submit', (e) => {
    e.preventDefault();
    createContact({
      first: document.getElementById('sc-first').value.trim(),
      last:  document.getElementById('sc-last').value.trim(),
      phone: document.getElementById('sc-phone').value.trim(),
      email: document.getElementById('sc-email').value.trim(),
      btn:   document.getElementById('sellerCreateBtn'),
      form:  document.getElementById('sellerCreateForm')
    });
  });

  document.getElementById('buyerCreateForm').addEventListener('submit', (e) => {
    e.preventDefault();
    createContact({
      first: document.getElementById('bc-first').value.trim(),
      last:  document.getElementById('bc-last').value.trim(),
      phone: document.getElementById('bc-phone').value.trim(),
      email: document.getElementById('bc-email').value.trim(),
      btn:   document.getElementById('buyerCreateBtn'),
      form:  document.getElementById('buyerCreateForm')
    });
  });

  // ════════════════════════════════════════════════════════════
  // SHOWING INTAKE (unchanged logic — now lives under Seller)
  // ════════════════════════════════════════════════════════════
  const listingSelect  = document.getElementById('listing');
  const listingLoading = document.getElementById('listingLoading');
  const form           = document.getElementById('showingForm');
  const submitBtn      = document.getElementById('submitBtn');

  let listingsData = [];

  async function loadListings() {
    try {
      const range = encodeURIComponent('Active Listings!A:N');
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      const rows = data.values || [];

      const headers = rows[0];
      const activeIdx  = headers.indexOf('Active');
      const firstIdx   = headers.indexOf('First Name');
      const lastIdx    = headers.indexOf('Last Name');
      const addrIdx    = headers.indexOf('Address');

      listingsData = rows.slice(1).filter(row => row[activeIdx] === 'Yes' && row[addrIdx]);

      listingLoading.style.display = 'none';
      listingSelect.style.display  = 'block';

      listingsData.forEach((row, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        const sellerName = `${row[firstIdx]} ${row[lastIdx]}`.trim();
        const address = row[addrIdx] && row[addrIdx] !== ',' ? row[addrIdx] : '';
        opt.textContent = address ? `${address} — ${sellerName}` : sellerName;
        listingSelect.appendChild(opt);
      });

    } catch (err) {
      listingLoading.textContent = 'Could not load listings. Refresh and try again.';
      console.error(err);
    }
  }

  loadListings();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const idx = listingSelect.value;
    if (idx === '') { showToast('Please select a listing.', true); return; }

    const row = listingsData[idx];
    const headers = ['First Name','Last Name','Address','Phone','Seller Email','List Date','DOM','List Price','Price Reductions','Showing Count','Update Summary','Active','Last Week Showing Count','GHL Contact ID'];

    const get = (h) => {
      const i = headers.indexOf(h);
      return i >= 0 ? (row[i] || '') : '';
    };

    const payload = {
      seller_first_name:  get('First Name'),
      seller_last_name:   get('Last Name'),
      seller_address:     get('Address'),
      seller_phone:       get('Phone'),
      seller_email:       get('Seller Email'),
      seller_contact_id:  get('GHL Contact ID'),
      agent_name:   document.getElementById('agentName').value.trim(),
      agent_phone:  document.getElementById('agentPhone').value.trim(),
      agent_email:  document.getElementById('agentEmail').value.trim(),
      showing_date:   document.getElementById('showingDate').value,
      showing_time:   document.getElementById('showingTime').value,
      intake_source:  'Tanya',
    };

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');

    try {
      await fetch(MAKE_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      showToast('✓ Showing logged successfully!');
      form.reset();
      listingSelect.value = '';
      document.getElementById('showingDate').value = new Date().toISOString().split('T')[0];

    } catch (err) {
      showToast('Something went wrong. Try again.', true);
      console.error(err);
    } finally {
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
    }
  });

  document.getElementById('showingDate').value = new Date().toISOString().split('T')[0];

  // ════════════════════════════════════════════════════════════
  // SCHEDULED MESSAGES (unchanged)
  // ════════════════════════════════════════════════════════════
  const contactSearch   = document.getElementById('contactSearch');
  const searchResults   = document.getElementById('searchResults');
  const selectedContact = document.getElementById('selectedContact');
  const msgForm         = document.getElementById('messageForm');
  const scheduleBtn     = document.getElementById('scheduleBtn');
  const scheduleBtnText = document.getElementById('scheduleBtnText');
  const msgText         = document.getElementById('msgText');
  const charCount       = document.getElementById('charCount');
  const editingBanner   = document.getElementById('editingBanner');

  let selected = null;      // {name, phone, contactId}
  let editingId = null;     // message ID being edited
  let searchTimer = null;

  // Char counter
  msgText.addEventListener('input', () => {
    const len = msgText.value.length;
    charCount.textContent = `${len} / 320`;
    charCount.className = 'char-count' + (len > 320 ? ' over' : '');
  });

  // ── Contact search (GHL) ──
  contactSearch.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = contactSearch.value.trim();
    if (q.length < 2) { searchResults.classList.remove('show'); return; }
    searchTimer = setTimeout(() => searchContacts(q), 350);
  });

  async function searchContacts(query) {
    try {
      const url = `/.netlify/functions/search-contacts?query=${encodeURIComponent(query)}`;
      const res = await fetch(url);
      const data = await res.json();
      const contacts = data.contacts || [];

      searchResults.innerHTML = '';
      if (contacts.length === 0) {
        searchResults.innerHTML = '<div class="search-result"><div class="sr-name">No contacts found</div></div>';
      } else {
        contacts.forEach(c => {
          const name = `${c.firstName || ''} ${c.lastName || ''}`.trim() || c.contactName || 'Unnamed';
          const phone = c.phone || '';
          const div = document.createElement('div');
          div.className = 'search-result';
          div.innerHTML = `<div class="sr-name">${name}</div><div class="sr-phone">${phone || 'No phone on file'}</div>`;
          div.addEventListener('click', () => {
            if (!phone) { showToast('That contact has no phone number in GHL.', true); return; }
            selected = { name, phone, contactId: c.id };
            document.getElementById('scName').textContent = name;
            document.getElementById('scPhone').textContent = phone;
            selectedContact.classList.add('show');
            searchResults.classList.remove('show');
            contactSearch.value = '';
          });
          searchResults.appendChild(div);
        });
      }
      searchResults.classList.add('show');
    } catch (err) {
      console.error(err);
      showToast('Contact search failed. Try again.', true);
    }
  }

  // Close results when clicking outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) searchResults.classList.remove('show');
  });

  // Clear selected contact
  document.getElementById('scClear').addEventListener('click', () => {
    selected = null;
    selectedContact.classList.remove('show');
  });

  // ── Schedule / Edit submit ──
  msgForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!selected) { showToast('Please select a contact.', true); return; }
    const message  = msgText.value.trim();
    const sendDate = document.getElementById('sendDate').value;
    const sendTime = document.getElementById('sendTime').value;
    if (!message)  { showToast('Please type a message.', true); return; }
    if (!sendDate || !sendTime) { showToast('Please pick a date and time.', true); return; }

    const payload = {
      action: editingId ? 'edit' : 'schedule',
      message_id: editingId || ('msg_' + Date.now()),
      first_name: selected.firstName || selected.name.split(' ')[0] || '',
      last_name: selected.lastName || selected.name.split(' ').slice(1).join(' ') || '',
      contact_id: selected.contactId || '',
      phone: selected.phone,
      message: message,
      send_date: sendDate,
      send_time: sendTime
    };

    scheduleBtn.disabled = true;
    scheduleBtn.classList.add('loading');

    try {
      await fetch(SMS_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      showToast(editingId ? '✓ Message updated!' : '✓ Message scheduled!');
      resetMsgForm();
      setTimeout(loadQueue, 2500); // give Make a moment to write the row

    } catch (err) {
      showToast('Something went wrong. Try again.', true);
      console.error(err);
    } finally {
      scheduleBtn.disabled = false;
      scheduleBtn.classList.remove('loading');
    }
  });

  function resetMsgForm() {
    msgForm.reset();
    selected = null;
    selectedContact.classList.remove('show');
    charCount.textContent = '0 / 320';
    charCount.className = 'char-count';
    editingId = null;
    editingBanner.classList.remove('show');
    scheduleBtnText.textContent = 'Schedule Message';
  }

  document.getElementById('editCancelBtn').addEventListener('click', resetMsgForm);

  // ── Queue (reads Scheduled SMS tab) ──
  const pendingList = document.getElementById('pendingList');
  const sentList    = document.getElementById('sentList');

  document.getElementById('refreshQueue').addEventListener('click', loadQueue);

  async function loadQueue() {
    try {
      const range = encodeURIComponent('Scheduled SMS Action!A:K');
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      const rows = (data.values || []).slice(1); // skip header

      // Columns: A id, B first, C last, D phone, E contact_id, F message, G send_date, H send_time, I status, J created, K sent_at
      const pending = rows.filter(r => (r[8] || '').toLowerCase() === 'pending');
      const sent    = rows.filter(r => (r[8] || '').toLowerCase() === 'sent').slice(-10).reverse();

      // Pending
      pendingList.innerHTML = '';
      if (pending.length === 0) {
        pendingList.innerHTML = '<div class="queue-empty">No pending messages.</div>';
      } else {
        pending.sort((a, b) => (`${a[5]} ${a[6]}`).localeCompare(`${b[5]} ${b[6]}`));
        pending.forEach(r => {
          const div = document.createElement('div');
          div.className = 'queue-item';
          div.innerHTML = `
            <div class="qi-top">
              <div class="qi-name">${esc((r[1] || '') + ' ' + (r[2] || ''))}</div>
              <div class="qi-when">${formatWhen(r[6], r[7])}</div>
            </div>
            <div class="qi-msg">${esc(r[5])}</div>
            <div class="qi-actions">
              <button class="qi-btn qi-edit" type="button">Edit</button>
              <button class="qi-btn qi-cancel" type="button">Cancel</button>
            </div>`;
          div.querySelector('.qi-edit').addEventListener('click', () => startEdit(r));
          div.querySelector('.qi-cancel').addEventListener('click', (e) => cancelMessage(r[0], e.target));
          pendingList.appendChild(div);
        });
      }

      // Sent
      sentList.innerHTML = '';
      if (sent.length === 0) {
        sentList.innerHTML = '<div class="queue-empty">Nothing sent yet.</div>';
      } else {
        sent.forEach(r => {
          const div = document.createElement('div');
          div.className = 'sent-item';
          div.innerHTML = `
            <div class="si-name">${esc((r[1] || '') + ' ' + (r[2] || ''))}</div>
            <div class="si-msg">${esc(r[5])}</div>
            <div class="si-when">${formatWhen(r[6], r[7])}</div>`;
          sentList.appendChild(div);
        });
      }

    } catch (err) {
      console.error(err);
      pendingList.innerHTML = '<div class="queue-empty">Could not load queue. Hit refresh.</div>';
      sentList.innerHTML = '<div class="queue-empty">Could not load history.</div>';
    }
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatWhen(dateStr, timeStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(`${dateStr}T${timeStr || '00:00'}`);
      const opts = { month: 'short', day: 'numeric' };
      const datePart = d.toLocaleDateString('en-US', opts);
      const timePart = timeStr ? d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
      return timePart ? `${datePart} · ${timePart}` : datePart;
    } catch { return `${dateStr} ${timeStr || ''}`; }
  }

  function startEdit(r) {
    editingId = r[0];
    selected = { name: (r[1] || '') + ' ' + (r[2] || ''), firstName: r[1] || '', lastName: r[2] || '', phone: r[3] || '', contactId: r[4] || '' };
    document.getElementById('scName').textContent = (r[1] || '') + ' ' + (r[2] || '');
    document.getElementById('scPhone').textContent = r[3] || '';
    selectedContact.classList.add('show');
    msgText.value = r[5] || '';
    msgText.dispatchEvent(new Event('input'));
    document.getElementById('sendDate').value = r[6] || '';
    document.getElementById('sendTime').value = r[7] || '';
    editingBanner.classList.add('show');
    scheduleBtnText.textContent = 'Update Message';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function cancelMessage(id, btnEl) {
    if (!confirm('Cancel this scheduled message?')) return;
    btnEl.disabled = true;
    try {
      await fetch(SMS_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'cancel', message_id: id })
      });
      showToast('✓ Message cancelled.');
      setTimeout(loadQueue, 2500);
    } catch (err) {
      showToast('Cancel failed. Try again.', true);
      btnEl.disabled = false;
    }
  }
</script>
</body>
</html>
